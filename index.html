<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F4EFE7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Casita</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pixelify+Sans:wght@400;500;600;700&family=VT323&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4EFE7; --bg2:#EDE6DA; --surface:#FFFDF9; --surface2:#FBF7EF;
  --ink:#4A443D; --ink2:#8B8377;
  --ink3:#B7AFA2; --line:#EAE1D3;
  --accent:#8FAE8B; --strong:#6E8C6A; --soft:#EAF1E8;
  --good:#7FA77B; --bad:#D58E8E; --gold:#E7B84B;
  --r:18px; --sh:0 6px 18px rgba(120,105,80,.10); --sh2:0 10px 26px rgba(120,105,80,.13);
}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Nunito',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:
    repeating-linear-gradient(0deg,rgba(176,160,132,.045) 0 2px,transparent 2px 28px),
    repeating-linear-gradient(90deg,rgba(176,160,132,.045) 0 2px,transparent 2px 28px);
}
/* Outfit: font limpia para números y cantidades (dígitos claros y distinguibles) */
.pix{font-family:'Outfit','Nunito',sans-serif;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.px{display:block;image-rendering:pixelated}
#app{max-width:480px;margin:0 auto;height:100dvh;height:100vh;background:var(--bg);position:relative;
  display:flex;flex-direction:column;box-shadow:0 0 60px rgba(120,105,80,.08)}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px 120px;animation:fade .25s ease}
@keyframes fade{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}

/* headers */
.top{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.top .ttl h1{font-size:22px;font-weight:900;letter-spacing:-.4px;line-height:1.1}
.top .ttl p{font-size:13px;color:var(--ink2);margin-top:3px;font-weight:600}
.iconbtn{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);background:var(--surface);
  box-shadow:var(--sh);color:var(--ink);font-size:22px;cursor:pointer;display:grid;place-items:center;flex:none;font-weight:800}
.iconbtn:active{transform:scale(.93)}

/* greeting */
.hello{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.hello .mas{position:relative;flex:none}
.hello .spk{position:absolute;top:-6px;right:-8px;animation:pop .4s ease}
.hello .spk2{position:absolute;bottom:2px;left:-9px;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.hello h1{font-size:21px;font-weight:900;letter-spacing:-.3px}
.hello p{font-size:13px;color:var(--ink2);font-weight:600;margin-top:2px}

/* hero balance */
.hero{background:linear-gradient(145deg,var(--soft) 0%,var(--surface) 75%);border:1px solid var(--line);
  border-radius:24px;padding:20px;box-shadow:var(--sh2);position:relative;overflow:hidden}
.hero .deco{position:absolute;right:16px;top:18px}
.hero .lbl{font-size:11px;color:var(--ink2);font-weight:800;text-transform:uppercase;letter-spacing:1px}
.hero .amt{font-size:36px;font-weight:600;margin-top:5px;color:var(--ink);line-height:1}
.hero .sub{font-size:12.5px;color:var(--ink2);font-weight:700;margin-top:9px}

/* cards & sections */
.card{background:var(--surface);border-radius:var(--r);box-shadow:0 3px 14px rgba(60,52,42,.09),0 1px 4px rgba(60,52,42,.05);padding:16px;border:1.5px solid rgba(234,225,211,.9);position:relative;z-index:2}
.section-t{display:flex;align-items:center;gap:10px;margin:22px 0 12px;padding:9px 16px 9px 14px;background:linear-gradient(90deg,var(--soft) 0%,rgba(244,239,231,0) 85%);border-left:4px solid var(--head-color,var(--accent));border-radius:0 14px 14px 0;font-size:13px;font-weight:900;color:var(--head-color,var(--strong));text-transform:uppercase;letter-spacing:.9px;animation:sectionPulse 3s ease-in-out infinite}
.section-t .link{margin-left:auto;font-family:'Nunito';font-size:12px;color:var(--head-color,var(--strong));font-weight:800;cursor:pointer;letter-spacing:0;text-transform:none;white-space:nowrap;opacity:.85}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:11px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px}
.stat .k{font-size:10.5px;color:var(--ink2);font-weight:800;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.stat .v{font-size:19px;font-weight:900;margin-top:4px}
.v.good{color:var(--good)} .v.bad{color:var(--bad)} .v.accent{color:var(--strong)}

/* buttons */
.btn{appearance:none;border:none;border-radius:15px;padding:14px 16px;font-family:'Nunito';font-weight:900;
  font-size:15px;cursor:pointer;background:var(--accent);color:#fff;box-shadow:var(--sh);width:100%;letter-spacing:.2px}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.sm{padding:9px 13px;font-size:13px;width:auto;border-radius:12px}
.btn.danger{background:#EBD9D9;color:#B05858}
.btn.add{background:var(--surface);color:var(--strong);border:1.5px dashed var(--accent);box-shadow:none}

/* segmented progress */
.seg{display:flex;gap:2.5px;height:13px}
.seg i{flex:1;background:var(--bg2);border-radius:2px;transition:background .2s}
.seg i.on{background:var(--accent)}

/* generic rows */
.list{display:flex;flex-direction:column;gap:9px}
.item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:15px;padding:12px 13px;cursor:pointer}
.item:active{transform:scale(.99)}
.ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex:none}
.item .mid{flex:1;min-width:0}
.item .mid b{font-size:14.5px;font-weight:800;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .mid span{font-size:12px;color:var(--ink2);font-weight:600}
.item .amt{font-weight:900;font-size:15px;white-space:nowrap}
.amt.good{color:var(--good)} .amt.bad{color:var(--bad)}

/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:3px 2px;margin:0 -2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1.5px solid var(--line);background:var(--surface);border-radius:999px;
  padding:8px 14px;font-size:13px;font-weight:800;color:var(--ink2);cursor:pointer}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.dhead{font-size:12px;font-weight:900;color:var(--ink2);margin:16px 4px 6px;text-transform:capitalize}

/* month switcher */
.month{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
.month b{font-size:15px;font-weight:900;text-transform:capitalize;min-width:140px;text-align:center}
.month button{width:34px;height:34px;border-radius:11px;border:1px solid var(--line);background:var(--surface);
  font-size:18px;color:var(--ink);cursor:pointer;box-shadow:var(--sh);font-weight:800}

/* search */
.search{width:100%;border:1.5px solid var(--line);background:var(--surface);border-radius:13px;
  padding:11px 14px;font-family:'Nunito';font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.search:focus{outline:none;border-color:var(--accent)}

/* bar chart – labels above bars */
.bars{display:flex;align-items:stretch;gap:8px;height:116px;padding-top:4px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center}
.bars .b .bsp{flex:1} /* spacer pushes bar down */
.bars .b i{width:100%;max-width:28px;background:var(--accent);opacity:.65;border-radius:5px 5px 3px 3px;min-height:3px;transition:height .3s;flex:none}
.bars .b.cur i{opacity:1}
.bars .b span{font-size:9.5px;color:var(--ink3);font-weight:800;text-transform:capitalize;margin-top:4px;flex:none}
.bar-lbl{font-size:9px;font-weight:800;color:var(--ink2);white-space:nowrap;height:17px;display:flex;align-items:flex-end;justify-content:center;line-height:1;flex:none}
.bars .b.cur .bar-lbl{color:var(--strong);font-size:10px;font-weight:900}

/* mini cat for cards */
.minihead{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.minihead .px{flex:none}

/* checkbox */
.cbx{width:25px;height:25px;border-radius:8px;border:2px solid var(--line);background:var(--surface);
  cursor:pointer;flex:none;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900}
.cbx.on{background:var(--accent);border-color:var(--accent)}
.done b{text-decoration:line-through;color:var(--ink3)}
.del{background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:4px;flex:none;font-weight:700}

/* pills & badges */
.pill{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;background:var(--soft);color:var(--strong);letter-spacing:.2px}
.pill.gold{background:#FBF0D6;color:#B58B27}
.pill.warn{background:#FBE6E6;color:#C46868}
.pill.blue{background:#E8F0F5;color:#5E89A6}

/* empty */
.empty{text-align:center;padding:38px 18px;color:var(--ink2)}
.empty .px{margin:0 auto 14px;opacity:.85}
.empty p{font-size:14.5px;font-weight:800;color:var(--ink)}
.empty small{font-size:12.5px;color:var(--ink3);display:block;margin-top:4px;font-weight:600}

/* menu list (Más) */
.menu{display:flex;flex-direction:column;gap:9px}
.menu .item .ar{color:var(--ink3);font-size:20px;font-weight:800}

/* FAB */
.fab{position:fixed;bottom:88px;right:max(16px,calc(50% - 224px));width:58px;height:58px;border-radius:19px;
  border:none;background:var(--accent);color:#fff;font-size:32px;line-height:1;cursor:pointer;z-index:40;
  display:grid;place-items:center;box-shadow:0 12px 24px rgba(110,140,106,.42)}
.fab:active{transform:scale(.92)}

/* bottom nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:9999;
  background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:9px 6px calc(9px + env(safe-area-inset-bottom,0px));box-shadow:0 -4px 22px rgba(120,105,80,.06)}
.nav-b{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;color:var(--ink3);font-size:10px;font-weight:800;padding:4px;letter-spacing:.2px}
.nav-b.on{color:var(--accent)}

/* modal */
.ov{position:fixed;inset:0;background:rgba(60,52,42,.42);backdrop-filter:blur(3px);z-index:60;
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:26px 26px 0 0;
  padding:20px 18px calc(22px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;
  box-shadow:0 -12px 44px rgba(60,52,42,.22);animation:up .28s cubic-bezier(.2,.8,.3,1)}
@keyframes up{from{transform:translateY(36px)}to{transform:none}}
.sheet h2{font-size:19px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}
.sheet h2 .x{margin-left:auto}

/* forms */
.f{margin-bottom:14px}
.f>label{display:block;font-size:11px;font-weight:900;color:var(--ink2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.f input,.f select,.f textarea{width:100%;border:1.5px solid var(--line);background:var(--surface2);border-radius:13px;
  padding:13px;font-family:'Nunito';font-size:15px;color:var(--ink);font-weight:700}
.f textarea{resize:vertical;min-height:64px}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.f input[type=date]{font-weight:700}
.amount-in{font-family:'Outfit',sans-serif!important;font-size:30px!important;text-align:center;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{border:1.5px solid var(--line);background:var(--surface2);border-radius:12px;padding:10px 13px;
  font-family:'Nunito';font-size:14px;font-weight:800;cursor:pointer;color:var(--ink2)}
.opt:active{transform:scale(.96)}
.opt.active{border-color:var(--accent);background:var(--soft);color:var(--strong)}
.opt.emoji{font-size:21px;padding:8px 11px;line-height:1}
.opt.sw{width:32px;height:32px;padding:0;border-radius:50%;border:2px solid rgba(0,0,0,.06)}
.opt.sw.active{box-shadow:0 0 0 3px var(--surface),0 0 0 5px var(--accent)}
.seg2{display:flex;gap:8px}
.seg2 .opt{flex:1;text-align:center}
.hint{font-size:12px;color:var(--ink2);font-weight:600;margin-top:-6px;margin-bottom:14px;line-height:1.4}
.shake{animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* settings specific */
.codebox{background:#3D3A36;color:#D9D2C5;border-radius:13px;padding:13px;font-family:ui-monospace,monospace;
  font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow:auto;margin-top:8px}
.statusdot{width:9px;height:9px;border-radius:50%;background:var(--ink3);flex:none}
.statusdot.on{background:var(--good)}
details summary{cursor:pointer;font-weight:800;color:var(--strong);font-size:13px;list-style:none}
details summary::-webkit-details-marker{display:none}

.mt{margin-top:12px}.mb{margin-bottom:12px}
.muted{color:var(--ink2);font-weight:600;font-size:13px;line-height:1.5}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.totline{display:flex;align-items:center;justify-content:space-between;font-weight:900;font-size:16px;margin-top:6px}
.pct{font-family:'Pixelify Sans',cursive;font-weight:600}

/* ══════════════ FISH BACKGROUND LAYER ══════════════ */
#fishbg{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.fish-el{position:absolute;will-change:transform}
@keyframes swimRight{from{transform:translateX(-160px)}to{transform:translateX(calc(100vw + 160px))}}
@keyframes swimLeft{from{transform:translateX(calc(100vw + 160px))}to{transform:translateX(-160px)}}
@keyframes fishBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

/* ══════════════ ANIMATED HERO CARD ══════════════ */
.hero{
  background:linear-gradient(-45deg,var(--soft) 0%,#FFF5EC 35%,var(--soft) 65%,#F5EDFB 100%) !important;
  background-size:400% 400% !important;
  animation:gradShift 6s ease infinite;
}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ══════════════ PAGE SLIDE-IN ══════════════ */
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.slide-in{animation:slideUp .28s cubic-bezier(.2,.8,.3,1) both}

/* ══════════════ FAB PULSE ══════════════ */
@keyframes fabPulse{
  0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.18),0 0 0 0 var(--accent)}
  60%{box-shadow:0 8px 24px rgba(0,0,0,.18),0 0 0 14px rgba(143,174,139,0)}
}
.fab{animation:fabPulse 2.8s ease-in-out infinite}

/* ══════════════ CONFETTI ══════════════ */
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-70px) rotate(540deg) scale(0)}
}
.confetti-bit{position:fixed;pointer-events:none;z-index:98;animation:confettiFall 0.85s ease-out forwards}

/* ══════════════ COLORFUL ITEM ROWS ══════════════ */
.item.vivid{border-left:4px solid var(--accent);border-radius:0 14px 14px 0}
.item.vivid .ic{filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}

/* ══════════════ LIST TYPE BADGE ══════════════ */
.list-badge{display:flex;align-items:center;gap:10px;border-radius:14px;padding:10px 14px;
  margin-bottom:14px;font-weight:900;font-size:14px;border-width:1.5px;border-style:solid}

/* ══════════════ ENHANCED NAV ══════════════ */
nav{backdrop-filter:blur(16px);background:rgba(244,239,231,.88) !important;border-top:1.5px solid var(--line)}
.nav-b.on{color:var(--strong)}
.nav-b.on .ic{background:var(--soft);border-radius:11px;padding:2px;transition:all .2s}
.nav-b{transition:color .15s}

/* ══════════════ ANIMATED SEGBAR ══════════════ */
.seg i.on{transition:background .2s}
.seg i{transition:background .15s}

/* ══════════════ ENHANCED BARS ══════════════ */
.bars .b.cur i{background:var(--strong) !important;border-radius:6px 6px 3px 3px}

/* ══════════════ HELLO SECTION EXTRAS ══════════════ */
@keyframes mascotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.deco .px{animation:mascotBounce 2.2s ease-in-out infinite}
@keyframes sparkFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-18px) scale(0.5);opacity:0}}
.spk{animation:sparkFloat 2.4s ease-out infinite}
.spk2{animation:sparkFloat 2.4s ease-out .8s infinite}

/* ══ SCREEN stacking context (above z-1 fish) ══ */
#screen{position:relative;z-index:2}
nav{z-index:15!important}
#fab{z-index:12!important}

/* ══ AUTH SCREEN ══ */
#authWrap{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;overflow-y:auto}
#authWrap.visible{display:flex}

/* ══ MODAL STICKY HEADER (close always visible) ══ */
.sheet h2{position:sticky;top:0;background:var(--surface);z-index:5;margin:0 -16px;padding:16px 16px 14px;border-bottom:1px solid var(--line)}

/* ══ HELLO CARD ══ */
.hello-card{
  background:linear-gradient(145deg, var(--soft) 0%, #FEFCF8 55%, var(--soft) 100%);
  border-radius:24px; padding:22px 20px 18px;
  border:1.5px solid var(--line);
  box-shadow:0 6px 24px rgba(60,52,42,.09),0 2px 6px rgba(60,52,42,.05);
  margin-bottom:6px; position:relative; overflow:hidden;
}
.hello-card::before{
  content:''; position:absolute; top:-40px; right:-40px;
  width:130px; height:130px; border-radius:50%;
  background:var(--accent); opacity:.10; pointer-events:none;
}
.hello-card::after{
  content:''; position:absolute; bottom:-30px; left:-20px;
  width:90px; height:90px; border-radius:50%;
  background:var(--strong); opacity:.06; pointer-events:none;
}
.hello-toprow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hello-clockbox{}
.hello-wx-row{display:flex;align-items:center;gap:6px;margin-top:7px;padding:6px 10px;background:rgba(255,255,255,.55);border-radius:10px;border:1px solid rgba(255,255,255,.7)}
.hello-time{font-size:54px!important;line-height:1;letter-spacing:2px;color:var(--clock-color,var(--strong));font-family:'VT323','Courier New',monospace!important;font-weight:400}
.pct{font-family:'Outfit',sans-serif;font-weight:800;font-variant-numeric:tabular-nums}
.hello-datestr{font-size:12px;font-weight:700;color:var(--ink2);margin-top:4px;text-transform:capitalize;line-height:1.3}
.hello-greeting{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.4px;line-height:1.2;margin:14px 0}
.hello-greeting b{color:var(--head-color,var(--strong))}
.hello-footer{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.hpill{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;
  font-size:11px;font-weight:800;line-height:1;border:1px solid transparent}
.hpill.online{background:#E4F5E9;color:#1B6B31;border-color:#B8DFC5}
.hpill.offline{background:#F5E4E4;color:#8B2E2E;border-color:#DFC5C5}
.hpill.wx{background:#FFF4D0;color:#7A5800;border-color:#E8D898}
.hpill.ver{background:var(--soft);color:var(--strong);border-color:var(--line)}

/* ══ SECTION HEADER ANIMATIONS ══ */
@keyframes sectionPulse {
  0%,100%{border-left-color:var(--head-color,var(--accent));box-shadow:none}
  50%{border-left-color:var(--head-color,var(--accent));box-shadow:0 2px 18px -4px var(--head-color,var(--accent))66}
}
/* ══ SECTION HEADER – color sólido sin animación de luz ══ */
.section-t > span:first-child {
  display:inline-block;
  color: var(--head-color, var(--strong));
  font-size: 13px;
  font-weight: 900;
}

/* ─ Supabase client (lazy) ─ */
let _supa=null;
async function sb(){
  if(_supa)return _supa;
  if(!SUPA_URL||!SUPA_KEY)throw new Error('No credentials');
  if(!window.supabase)throw new Error('Supabase library not loaded');
  _supa=window.supabase.createClient(SUPA_URL,SUPA_KEY,{auth:{persistSession:true,autoRefreshToken:true}});
  return _supa;
}

/* ─ Tema ─ */
function applyTheme(){
  const t=THEMES[mySettings.accent]||THEMES.salvia;
  const r=document.documentElement.style;
  r.setProperty('--accent',t.accent);r.setProperty('--strong',t.strong);r.setProperty('--soft',t.soft);
  r.setProperty('--clock-color',mySettings.clockColor||t.strong);
  r.setProperty('--head-color',mySettings.headColor||t.accent);
}

═══════════════════════════════════════════════════════ */
let _fetching=false;
async function fetchAll(){
  if(_fetching||!household)return;_fetching=true;
  try{
    const c=await sb();const hid=household.id;
    const [txR,catR,accR,goalR,lstR,remR,moodR,noteR,memR]=await Promise.all([
      c.from('casita_transactions').select('*').eq('household_id',hid).order('date',{ascending:false}),
      c.from('casita_categories').select('*').eq('household_id',hid).order('name'),
      c.from('casita_accounts').select('*').eq('household_id',hid),
      c.from('casita_goals').select('*').eq('household_id',hid),
      c.from('casita_lists').select('*').eq('household_id',hid),
      c.from('casita_reminders').select('*').eq('household_id',hid),
      c.from('casita_moods').select('*').eq('household_id',hid).eq('user_id',supaUser.id),
      c.from('casita_day_notes').select('*').eq('household_id',hid).eq('user_id',supaUser.id),
      c.from('casita_household_members').select('*').eq('household_id',hid),
    ]);
    transactions=txR.data||[];categories=catR.data||[];accounts=accR.data||[];
    goals=goalR.data||[];lists=lstR.data||[];reminders=remR.data||[];
    moods=moodR.data||[];dayNotes=noteR.data||[];members=memR.data||[];
    myMember=members.find(m=>m.user_id===supaUser.id);
    if(myMember?.settings)mySettings={...mySettings,...myMember.settings};
    const goalIds=goals.map(g=>g.id),listIds=lists.map(l=>l.id);
    if(goalIds.length){const{data:cd}=await c.from('casita_contributions').select('*').in('goal_id',goalIds);contributions=cd||[];}else contributions=[];
    if(listIds.length){const{data:id}=await c.from('casita_items').select('*').in('list_id',listIds);items=id||[];}else items=[];
    const{data:totals}=await c.rpc('casita_get_personal_totals',{p_household_id:hid,p_month:ui.month});
    memberPersonalTotals=totals||[];
    applyTheme();render();
  }catch(e){console.warn('fetchAll:',e);}finally{_fetching=false;}
}

/* ─ Realtime ─ */
let _rtChannel=null;
async function subscribeRealtime(){
  if(!household)return;const c=await sb();
  if(_rtChannel)await c.removeChannel(_rtChannel);
  _rtChannel=c.channel(`hh-${household.id}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'casita_transactions',filter:`household_id=eq.${household.id}`},()=>fetchAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'casita_goals',filter:`household_id=eq.${household.id}`},()=>fetchAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'casita_reminders',filter:`household_id=eq.${household.id}`},()=>fetchAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'casita_items'},()=>fetchAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'casita_moods',filter:`household_id=eq.${household.id}`},()=>fetchAll())
    .subscribe();
}

async function dbDelete(table,id){const c=await sb();const{error}=await c.from(table).delete().eq('id',id);if(error)throw error;}
async function dbUpsert(table,data){const c=await sb();const payload={...data,household_id:household.id,user_id:supaUser.id};const{error}=await c.from(table).upsert(payload);if(error)throw error;}

/* ═══════════════════════════════════════════════════════
   COMPUTE HELPERS (operan sobre los arrays en memoria)
═══════════════════════════════════════════════════════ */
function catById(id){return categories.find(c=>c.id===id)||{name:'Sin categoría',icon:'🏷️',color:'#B7AFA2',type:'gasto'}}
function accById(id){return accounts.find(a=>a.id===id)||{name:'—',icon:'•',color:'#B7AFA2'}}
function memberById(uid){return members.find(m=>m.user_id===uid)||{display_name:'?',icon:'👤',color:'#B7AFA2'}}

function txVisible(t){
  /* Regla: si visibility==='hogar' todos ven; si 'personal' solo el dueño */
  if(t.visibility!=='personal')return true;
  return t.user_id===supaUser?.id;
}

function monthTxAll(m){
  return transactions.filter(t=>ym(t.date)===m&&txVisible(t))
    .sort((a,b)=>(b.date+b.created_at).localeCompare(a.date+a.created_at));
}
function monthTx(m,filterVis){
  let list=monthTxAll(m);
  if(filterVis==='hogar') list=list.filter(t=>t.visibility==='hogar');
  if(filterVis==='personal') list=list.filter(t=>t.visibility==='personal'&&t.user_id===supaUser.id);
  return list;
}
function monthIncome(m){return sum(monthTxAll(m).filter(t=>t.type==='ingreso'),t=>Number(t.amount))}
function monthExpense(m){return sum(monthTxAll(m).filter(t=>t.type==='gasto'),t=>Number(t.amount))}
function monthHogarExpense(m){return sum(monthTxAll(m).filter(t=>t.type==='gasto'&&t.visibility==='hogar'),t=>Number(t.amount))}
function monthCatSpent(cid){return sum(monthTxAll(ui.month).filter(t=>t.category_id===cid&&t.type==='gasto'),t=>Number(t.amount))}

function accountBalance(id){
  const a=accounts.find(x=>x.id===id);if(!a)return 0;
  let b=Number(a.opening_balance)||0;
  for(const t of transactions.filter(t=>t.account_id===id&&txVisible(t)))b+=t.type==='ingreso'?Number(t.amount):-Number(t.amount);
  return b;
}
function totalBalance(){return sum(accounts,a=>accountBalance(a.id))}

function goalSaved(id){return sum(contributions.filter(c=>c.goal_id===id),c=>Number(c.amount))}
function goalCalc(g){
  const saved=goalSaved(g.id),target=Number(g.target)||0,remain=Math.max(0,target-saved);
  const pct=target>0?Math.min(100,saved/target*100):0;
  let perWeek=null,perMonth=null,daysLeft=null;
  if(g.target_date){const t=todayISO();daysLeft=Math.round((new Date(g.target_date+'T00:00')-new Date(t+'T00:00'))/86400000);
    if(remain>0&&daysLeft>0){perWeek=remain/Math.max(1,Math.ceil(daysLeft/7));perMonth=remain/Math.max(1,monthsBetween(t,g.target_date));}
    else if(remain>0){perWeek=remain;perMonth=remain;}}
  return{saved,target,remain,pct,perWeek,perMonth,daysLeft};
}

function topCats(m,type,limit=4){
  const map={};for(const t of monthTxAll(m)){if(t.type!==type)continue;map[t.category_id]=(map[t.category_id]||0)+Number(t.amount)}
  return Object.entries(map).map(([cid,amt])=>({cid,amt})).sort((a,b)=>b.amt-a.amt).slice(0,limit);
}
function gastosChart(n=6){const out=[];let m=ui.month;for(let i=0;i<n;i++){out.unshift({m,val:monthExpense(m)});m=shiftMonth(m,-1)}return out;}
function listItems(id){return items.filter(x=>x.list_id===id)}
function upcomingReminders(limit=4){
  const t=todayISO();
  return reminders.filter(r=>!r.done).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,limit);
}
function moodOf(date){return moods.find(m=>m.date===date)}
function dayNoteOf(date){return dayNotes.find(n=>n.date===date)}

function renderTxList(){
  const m=ui.month,vis=ui.visFilter||'todos';
  let list=monthTx(m,vis==='todos'?null:vis);
  if(ui.txFilter!=='todo')list=list.filter(t=>t.type===ui.txFilter);
  if(ui.q){const q=ui.q.toLowerCase();list=list.filter(t=>{const c=catById(t.category_id);return(t.note||'').toLowerCase().includes(q)||c.name.toLowerCase().includes(q)});}
  if(!list.length)return`<div class="empty">Sin movimientos${ui.q?' para tu búsqueda':' este mes'}.</div>`;
  const groups={};for(const t of list)(groups[t.date]=groups[t.date]||[]).push(t);
  return Object.keys(groups).sort().reverse().map(date=>{
    const dtot=sum(groups[date],t=>t.type==='ingreso'?Number(t.amount):-Number(t.amount));
    return`<div class="dhead"><span>${dayLabel(date)}</span><span class="${dtot>=0?'good':'bad'}">${dtot>=0?'+':''}${money0(dtot)}</span></div>
      <div class="card list">${groups[date].map(t=>txRow(t)).join('')}</div>`;
  }).join('');
}

function barsChart(){

  return`<div class="bars">${data.map((d,i)=>{
    const h=Math.max(3,Math.round(d.val/max*72));const cur=d.m===ui.month;
    const col=cur?'var(--strong)':BAR_C[i%6];const lbl=d.val>0?moneyShort(d.val):'';
    return`<div class="b ${cur?'cur':''}" title="${money0(d.val)}">

/* ═══════════════════════════════════════════════════════
   WEATHER + CALENDAR + MOOD (same as v1)
═══════════════════════════════════════════════════════ */
function wmoInfo(code){const keys=Object.keys(WMO).map(Number).sort((a,b)=>a-b);const k=keys.reduce((a,b)=>Math.abs(b-code)<Math.abs(a-code)?b:a);return WMO[k]||{e:'🌡️',d:'Variable'}}
async function fetchWeather(){
  if(!navigator.geolocation)return;
  return new Promise(resolve=>{navigator.geolocation.getCurrentPosition(async pos=>{
    try{const{latitude:lat,longitude:lon}=pos.coords;
      const[geoR,wR]=await Promise.all([fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`).then(r=>r.json()).catch(()=>({})),fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=8`).then(r=>r.json())]);
      geoCity=geoR.address?.city||geoR.address?.town||geoR.address?.municipality||'Tu ciudad';
      weatherData=wR;render();}catch(e){console.warn('Weather:',e);}resolve();},()=>resolve(),{timeout:12000});});
}
function weatherForDate(isoDate){if(!weatherData?.daily)return null;const idx=weatherData.daily.time.indexOf(isoDate);if(idx<0)return null;return{code:weatherData.daily.weathercode[idx],max:Math.round(weatherData.daily.temperature_2m_max[idx]),min:Math.round(weatherData.daily.temperature_2m_min[idx]),precip:weatherData.daily.precipitation_probability_max?.[idx]||0};}
function weatherWidget(){
  if(!weatherData){return`<div class="card" style="text-align:center;padding:18px;background:linear-gradient(135deg,#E8F4FD,#FFF9E0)"><div style="font-size:30px">🌡️</div><div class="hint" style="margin-top:4px">Obteniendo clima…<br><span style="font-size:10px;color:var(--ink3)">Requiere permiso de ubicación</span></div></div>`;}
  const cur=weatherData.current_weather,curWmo=wmoInfo(cur.weathercode);
  const BG_MAP={0:'linear-gradient(135deg,#FFF9C0,#FFE4B2)',1:'linear-gradient(135deg,#FFF9E0,#E8F4FD)',2:'linear-gradient(135deg,#E8F4FD,#F0F0FF)',3:'linear-gradient(135deg,#DDE8F0,#E8ECF4)',61:'linear-gradient(135deg,#C8D8EC,#E0ECF4)',95:'linear-gradient(135deg,#C8C8E8,#B8C0D8)'};
  const bg=BG_MAP[Math.round(cur.weathercode/10)*10]||'linear-gradient(135deg,#E8F4FD,#FFF9E0)';
  const forecast=weatherData.daily.time.slice(0,7).map((d,i)=>{const w=weatherForDate(d);if(!w)return'';const wmo=wmoInfo(w.code);const lbl=i===0?'Hoy':i===1?'Mañana':dayOfWeekShort(d);
    return`<div style="text-align:center;flex:1"><div style="font-size:9px;font-weight:900;color:var(--ink2)">${lbl}</div><div style="font-size:17px;line-height:1.3">${wmo.e}</div><div style="font-size:11px;font-weight:900;color:var(--ink)">${w.max}°</div><div style="font-size:9px;color:var(--ink2)">${w.min}°</div></div>`;}).join('');
  return`<div class="card" style="background:${bg};border:none;padding:16px"><div class="between" style="align-items:flex-start;gap:12px"><div><div style="font-size:50px;line-height:1">${curWmo.e}</div><div style="font-size:30px;font-family:'Outfit',sans-serif;font-weight:700">${Math.round(cur.temperature)}°</div><div class="sub">${curWmo.d}</div><div class="hint">${esc(geoCity)}</div></div><div style="flex:1;min-width:0"><div style="display:flex;gap:2px;overflow-x:auto">${forecast}</div></div></div></div>`;
}

function viewCalendar(){
  if(!ui.calMonth)ui.calMonth=ym(todayISO());
  const today=todayISO(),m=ui.calMonth;
  const firstDay=new Date(m+'-01T00:00'),lastDay=new Date(firstDay.getFullYear(),firstDay.getMonth()+1,0);
  const startDow=firstDay.getDay(),daysInMonth=lastDay.getDate();
  const DOW=['D','L','M','X','J','V','S'],DOW_COLS=['#E08585','#8FB1C9','#8FAE8B','#E7B84B','#B3A2D1','#E0A287','#D58E8E'];
  const headRow=DOW.map((d,i)=>`<div class="cal-head" style="color:${DOW_COLS[i]}">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty-cell"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const iso=`${m}-${String(day).padStart(2,'0')}`;
    const isToday=iso===today;const mood=moodOf(iso);const moodInfo=mood?MOOD_DATA.find(x=>x.v===mood.value):null;
    const w=weatherForDate(iso);const wmo=w?wmoInfo(w.code):null;
    const remCount=reminders.filter(r=>r.date===iso&&!r.done).length;
    const txCount=transactions.filter(t=>t.date===iso&&txVisible(t)).length;
    const hasNote=!!dayNoteOf(iso);
    const moodBg=moodInfo?`${moodInfo.c}55`:'';
    const cellCls=`cal-cell${isToday?' today-cell':''}${iso>today?' future-cell':''}`;
    cells+=`<div class="${cellCls}" data-act="calday:${iso}" style="${moodBg?'background:'+moodBg:''}">
      ${isToday?'<div class="today-ring"></div>':''}
      <div class="cal-num">${day}</div>
      <div class="cal-wx">${wmo?wmo.e:'&nbsp;'}</div>
      <div class="cal-mood">${moodInfo?moodInfo.e:''}</div>
      <div class="cal-dots">
        ${remCount?`<span style="font-size:${remCount>=5?12:10}px;font-weight:${remCount>=5?900:800};color:#9A6DC4">${remCount}</span>`:''}
        ${txCount?`<span style="font-size:${txCount>=5?12:10}px;font-weight:${txCount>=5?900:800};color:#5A8C60">${txCount}</span>`:''}
        ${hasNote?`<span style="font-size:10px;color:#C4982A">✎</span>`:''}
      </div></div>`;
  }
  const moodStats=MOOD_DATA.map(md=>{const n=moods.filter(x=>x.date.startsWith(m)&&x.value===md.v).length;return n?`${md.e}×${n}`:''}).filter(Boolean).join('  ');
  const moodLegend=MOOD_DATA.map(m=>`<span style="font-size:12px">${m.e}<span style="font-size:10px;color:var(--ink2)"> ${m.d}</span></span>`).join('  ');
  const upRem=[...reminders].filter(r=>!r.done&&r.date&&r.date.startsWith(m)&&r.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  return`
  ${topbar('📅 Planificador',capitalize(monthLabel(m)),null,'#54C5B8')}
  ${weatherWidget()}
  <div class="card" style="padding:16px 14px 14px;margin-top:14px">
    <div class="between" style="margin-bottom:12px;padding:0 2px">
      <button class="iconbtn" data-act="calmonth:-1">‹</button>
      <div style="text-align:center">
        <button data-act="openmonthpick" style="background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:12px;white-space:nowrap">
          <div class="b" style="font-size:17px">${capitalize(monthLabel(m))} <span style="font-size:11px;color:var(--ink2)">▾</span></div>
        </button>
        ${moodStats?`<div class="hint" style="margin-top:2px">${moodStats}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${m!==ym(todayISO())?`<button class="chip" style="font-size:11px;padding:3px 10px;height:auto" data-act="gotoday">Hoy</button>`:''}
        <button class="iconbtn" data-act="calmonth:1">›</button>
      </div>
    </div>
    <div class="cal-grid">${headRow}${cells}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center">${moodLegend}</div>
    <div style="display:flex;gap:14px;margin-top:8px;justify-content:center;font-size:10.5px;font-weight:700;color:var(--ink2)">
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#B3A2D1;margin-right:4px;vertical-align:middle"></span>Recordatorio</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#8FAE8B;margin-right:4px;vertical-align:middle"></span>Gasto</span>
      <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#E7B84B;margin-right:4px;vertical-align:middle"></span>Nota</span>

async function saveMood(date,value){
  if(!household)return;
  try{await dbUpsert('casita_moods',{date,value,household_id:household.id,user_id:supaUser.id});
    const existing=moods.findIndex(m=>m.date===date&&m.user_id===supaUser.id);
    const entry={date,value,household_id:household.id,user_id:supaUser.id};
    if(existing>=0)moods[existing]=entry;else moods.push(entry);
    if(value>=4)confetti(window.innerWidth/2,window.innerHeight/2,8);
    openCalDaySheet(date);
  }catch(e){toast('Error al guardar ánimo');}
}

async function saveForm(kind,andMore=false){
  captureModal();
  try{
    if(kind==='tx'){
      const inputAmt=parseAmt(fval('amount'));if(inputAmt<=0)return shake('#fld_amount');
      const homeCur=mySettings.currency||'MXN';
      const txCur=DRAFT.txCurrency||homeCur;
      const txRate=DRAFT.txRate||1;
      const amount=txCur!==homeCur?inputAmt*txRate:inputAmt;
      if(!amount||amount<=0)return shake('#fld_amount');
      const cat=DRAFT.category||(categories.find(c=>c.type===DRAFT.type)?.id)||null;
      const acc=DRAFT.account||(accounts[0]?.id)||null;
      const o={type:DRAFT.type,amount,category_id:cat,account_id:acc,note:fval('note').trim(),date:fval('date')||todayISO(),visibility:DRAFT.vis||'hogar',
        original_amount:txCur!==homeCur?inputAmt:null,
        original_currency:txCur!==homeCur?txCur:null};

      if(DRAFT._id){await dbUpdate('casita_categories',DRAFT._id,o);categories=categories.map(c=>c.id===DRAFT._id?{...c,...o}:c);}
      else{const row=await dbInsert('casita_categories',o);categories.push(row);}
    }else if(kind==='account'){
      const name=fval('name').trim();if(!name)return shake('#fld_name');
      const o={name,icon:fval('icon')||DRAFT.icon||'🏦',color:DRAFT.color,opening_balance:parseAmt(fval('opening'))};
      if(DRAFT._id){await dbUpdate('casita_accounts',DRAFT._id,o);accounts=accounts.map(a=>a.id===DRAFT._id?{...a,...o}:a);}
      else{const row=await dbInsert('casita_accounts',o);accounts.push(row);}
    }else if(kind==='daynote'){

async function deleteEntity(kind,id){
  try{
    if(kind==='tx'){await dbDelete('casita_transactions',id);transactions=transactions.filter(t=>t.id!==id);}
    else if(kind==='goal'){contributions=contributions.filter(c=>c.goal_id!==id);await dbDelete('casita_goals',id);goals=goals.filter(g=>g.id!==id);}
    else if(kind==='list'){items=items.filter(i=>i.list_id!==id);await dbDelete('casita_lists',id);lists=lists.filter(l=>l.id!==id);}
    else if(kind==='item'){const c=await sb();await c.from('casita_items').delete().eq('id',id);items=items.filter(i=>i.id!==id);}
    else if(kind==='reminder'){await dbDelete('casita_reminders',id);reminders=reminders.filter(r=>r.id!==id);}
    else if(kind==='category'){await dbDelete('casita_categories',id);categories=categories.filter(c=>c.id!==id);}
    else if(kind==='account'){await dbDelete('casita_accounts',id);accounts=accounts.filter(a=>a.id!==id);}
    else if(kind==='contribution'){const c=await sb();await c.from('casita_contributions').delete().eq('id',id);contributions=contributions.filter(c=>c.id!==id);}
    closeModal();render();
  }catch(e){toast('Error al eliminar');console.error(e);}
}

async function toggleItem(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  i.done=!i.done;
  const c=await sb();await c.from('casita_items').update({done:i.done}).eq('id',id);
  if(i.done){const btn=document.querySelector(`[data-act="item:${id}"]`);if(btn){const r=btn.getBoundingClientRect();confetti(r.left+r.width/2,r.top+r.height/2,12);}else confetti(window.innerWidth/2,window.innerHeight/2,12);}

async function toggleReminder(id){
  const r=reminders.find(x=>x.id===id);if(!r)return;r.done=!r.done;await dbUpdate('casita_reminders',id,{done:r.done});render();
}
async function payReminder(id){
  const r=reminders.find(x=>x.id===id);if(!r)return;
  if(r.amount>0){const cat=r.category_id?catById(r.category_id):categories.find(c=>c.type==='gasto');
    const o={type:'gasto',amount:Number(r.amount),category_id:cat?.id||null,account_id:accounts[0]?.id||null,note:r.title,date:todayISO(),visibility:r.visibility||'hogar'};
    const row=await dbInsert('casita_transactions',o);transactions.unshift(row);}
  if(r.recurrence&&r.recurrence!=='none'){const map={semanal:7,quincenal:15};
    const newDate=r.recurrence==='mensual'?addMonths(r.date||todayISO(),1):r.recurrence==='anual'?addMonths(r.date||todayISO(),12):addDays(r.date||todayISO(),map[r.recurrence]||30);
    r.date=newDate;r.done=false;await dbUpdate('casita_reminders',id,{date:newDate,done:false});toast('✓ Pagado y reagendado');
  }else{r.done=true;await dbUpdate('casita_reminders',id,{done:true});toast('✓ Pagado');}
  render();
}

/* ═══════════════════════════════════════════════════════
   ACTION DISPATCH
═══════════════════════════════════════════════════════ */
function doAct(token){
  /* Casos de token completo (tienen dos segmentos fijos) */
  switch(token){
    case'auth:login':    authDoLogin();return;
    case'auth:signup':   authDoSignup();return;
    case'auth:forgot':   authDoForgot();return;
    case'authview:login':  showAuth('login');return;
    case'authview:signup': showAuth('signup');return;
    case'authview:forgot': showAuth('forgot');return;
    case'authview:create': showAuth('create');return;
    case'authview:join':   showAuth('join');return;
    case'authview:offline':authGoOffline();return;
    case'hh:create': hhCreate();return;
    case'hh:join':   hhJoin();return;
    case'signout':   supaSignOut();return;
    case'copycode':   copyInviteCode();return;
    case'sharewa':    shareWhatsApp();return;
    case'savehh':         saveHouseholdName();return;
    case'savemembername': saveMemberName();return;
    case'openmonthpick':  openMonthPicker('cal');return;
    case'openmonthpick:dinero': openMonthPicker('dinero');return;
    case'applymonthpick': {const mon=$('#pickMon')?.value,yr=$('#pickYear')?.value,tgt=$('#pickTarget')?.value;if(mon&&yr){const nm=yr+'-'+mon;if(tgt==='dinero')ui.month=nm;else ui.calMonth=nm;closeModal();render();}return;}
    case'gotoday':        ui.calMonth=ym(todayISO());closeModal();render();return;
    case'gotodaydinero':  ui.month=ym(todayISO());render();return;
    case'confirmpay':     closeModal();payReminder(p[1]);return;
  }
  /* Casos parametrizados: split por ':' */
  const p=token.split(':');const a=p[0];
  switch(a){
    case'month':      ui.month=shiftMonth(ui.month,parseInt(p[1],10));render();break;
    case'filter':     ui.txFilter=p[1];render();break;
    case'calmonth':   ui.calMonth=shiftMonth(ui.calMonth||ym(todayISO()),parseInt(p[1],10));render();break;
    case'calday':     openCalDaySheet(p[1]);break;
    case'savemood':   saveMood(p[1],parseInt(p[2],10));break;
    case'addnote':    openDayNoteForm(p[1]);break;
    case'txtype':     captureModal();DRAFT.type=p[1];DRAFT.category=null;openTx(DRAFT._id);break;
    case'cattype':    captureModal();DRAFT.type=p[1];openCategory(DRAFT._id);break;
    case'save':       saveForm(p[1]);break;
    case'saveandmore':saveForm(p[1],true);break;
    case'del':        deleteEntity(p[1],p[2]);break;
    case'openlist':   ui.listId=p[1];ui.view='lista';render();break;
    case'item':       toggleItem(p[1]);break;
    case'rdone':      toggleReminder(p[1]);break;
    case'pay':        confirmPay(p[1]);break;
    case'theme':      mySettings.accent=p[1];applyTheme();saveMySettings();render();break;
    case'setclockcolor': mySettings.clockColor=p[1];applyTheme();saveMySettings();break;
    case'setheadcolor':  mySettings.headColor=p[1];applyTheme();saveMySettings();break;
    case'setkind': {
      DRAFT.kind=p[1];
      const ki=$('#fld_kind');if(ki)ki.value=p[1];
      $$('[data-act^="setkind:"]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-act')==='setkind:'+p[1]));
      break;
    }
    case'settxcur': {
      const cur=p[1],homeCur=mySettings.currency||'MXN';
      DRAFT.txCurrency=cur;
      /* Actualizar chips */
      $$('[data-act^="settxcur:"]').forEach(b=>b.classList.toggle('on',b.getAttribute('data-act')==='settxcur:'+cur));
      /* Actualizar badge de moneda */
      const badge=$('#curBadge');if(badge)badge.textContent=cur;
      const ri=$('#rateInfo'),amtEl=$('#fld_amount');
      if(cur===homeCur){
        DRAFT.txRate=1;
        if(ri)ri.textContent='';
        break;
      }
      if(ri)ri.innerHTML='<span style="opacity:.5">⏳ Obteniendo tipo de cambio…</span>';
      fetchRate(cur,homeCur).then(rate=>{
        if(!rate){DRAFT.txRate=null;if(ri)ri.textContent='⚠️ No se pudo obtener el tipo de cambio';return;}
        DRAFT.txRate=rate;
        const amt=parseAmt(amtEl?.value||'0');
        if(ri){
          const conv=amt>0?`<br><b style="font-size:14px;color:var(--strong)">${amt} ${cur} = ${money0(amt*rate)} ${homeCur}</b>`:'';
          ri.innerHTML=`Tasa: 1 ${cur} = ${rate.toFixed(4)} ${homeCur}${conv}`;
        }
      });
      break;
    }
  }
}

   AUTH HANDLERS
═══════════════════════════════════════════════════════ */
async function authDoLogin(){
  const email=($('#authEmail')||{}).value?.trim();
  const pass=($('#authPass')||{}).value;
  if(!email||!pass){showAuthErr('Ingresa tu correo y contraseña');return;}
  try{
    const c=await sb();const{data,error}=await c.auth.signInWithPassword({email,password:pass});
    if(error)throw error;supaUser=data.user;
    await afterLogin();
  }catch(e){showAuthErr('Correo o contraseña incorrectos');}
}
async function authDoSignup(){
  const email=($('#authEmail')||{}).value?.trim();
  const pass=($('#authPass')||{}).value;
  if(!email||!pass||pass.length<6){showAuthErr('Correo válido y contraseña de 6+ caracteres');return;}
  const btn=$('[data-act="auth:signup"]');
  if(btn){btn.disabled=true;btn.textContent='Creando...';}
  try{
    const c=await sb();
    /* 1. Crear cuenta */
    const{data,error}=await c.auth.signUp({email,password:pass});
    if(error)throw error;

    /* 2. Iniciar sesión inmediatamente para obtener JWT válido */
    const{data:sd,error:se}=await c.auth.signInWithPassword({email,password:pass});
    if(se){
      /* Signup ok pero confirmación de email requerida */
      if(btn){btn.disabled=false;btn.textContent='Crear cuenta';}
      showAuthErr('Cuenta creada. Confirma tu correo y luego inicia sesión.');
      setTimeout(()=>showAuth('login'),2500);
      return;
    }
    supaUser=sd.user;
    if(btn){btn.disabled=false;btn.textContent='Crear cuenta';}
    hideAuth();showAuth('create');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Crear cuenta';}
    showAuthErr(e.message||'No se pudo crear la cuenta');
  }
}
async function authDoForgot(){
  const email=($('#authEmail')||{}).value?.trim();
  if(!email){showAuthErr('Ingresa tu correo');return;}
  try{
    const c=await sb();await c.auth.resetPasswordForEmail(email);
    const el=$('#authErr');if(el){el.textContent='✓ Link enviado · Revisa tu correo';el.style.color='#30A868';el.style.display='block';}
  }catch(e){showAuthErr('No se pudo enviar el link');}
}

async function afterLogin(){
  try{
    const c=await sb();
    /* Dos queries separadas — más confiable que join con nombres prefijados */
    const{data:mems}=await c.from('casita_household_members')
      .select('*').eq('user_id',supaUser.id).order('joined_at').limit(1);
    const mem=mems?.[0];
    if(!mem){hideAuth();showAuth('create');return;}
    const{data:hh}=await c.from('casita_households')
      .select('*').eq('id',mem.household_id).single();
    if(!hh){hideAuth();showAuth('create');return;}
    household=hh;myMember=mem;
    await fetchAll();subscribeRealtime();hideAuth();render();fetchWeather();
  }catch(e){
    console.warn('afterLogin:',e);
    hideAuth();showAuth('create');
  }
}

function openMonthPicker(target='cal'){
  const src=target==='dinero'?ui.month:ui.calMonth;
  const [curY,curM]=src.split('-').map(Number);
  const todayY=parseInt(todayISO().slice(0,4));
  const yearOpts=Array.from({length:8},(_,i)=>todayY-4+i)
    .map(y=>`<option value="${y}" ${y===curY?'selected':''}>${y}</option>`).join('');
  const mons=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const monOpts=mons.map((mn,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${(i+1)===curM?'selected':''}>${mn}</option>`).join('');
  modal(`${sheetHead('Ir a mes y año','📅')}
    <input type="hidden" id="pickTarget" value="${target}">
    <div class="f2" style="gap:12px">
      <div class="f"><label>Mes</label><select id="pickMon">${monOpts}</select></div>
      <div class="f"><label>Año</label><select id="pickYear">${yearOpts}</select></div>
    </div>
    <button class="btn pix" data-act="applymonthpick" style="width:100%;margin-top:4px">Ir →</button>
    <button class="btn ghost mt" data-act="${target==='dinero'?'gotodaydinero':'gotoday'}" style="width:100%">📍 Ir a hoy</button>`);
}

async function copyInviteCode(){
  const code=household?.invite_code;
  if(!code){toast('Sin código de invitación');return;}
  try{
    await navigator.clipboard.writeText(code);
    toast('✓ Código copiado: '+code);
  }catch(e){
    /* fallback para iOS */
    const el=document.createElement('textarea');
    el.value=code;el.style.position='fixed';el.style.opacity='0';
    document.body.appendChild(el);el.select();
    try{document.execCommand('copy');toast('✓ Código copiado: '+code);}
    catch(e2){toast('Código: '+code);}
    document.body.removeChild(el);
  }
}

function confirmPay(id){
  const r=reminders.find(x=>x&&x.id===id);if(!r)return;
  modal(`${sheetHead('Confirmar pago','💳')}
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:20px;font-weight:900">${esc(r.title)}</div>
      ${r.amount?`<div style="font-size:24px;font-weight:900;color:var(--strong);margin-top:4px">${money0(r.amount)}</div>`:''}
      ${r.recurrence&&r.recurrence!=='none'?`<div style="font-size:12px;color:var(--ink2);margin-top:6px">El recordatorio se reagendará automáticamente al siguiente ciclo</div>`:''}
    </div>
    <button class="btn pix" data-act="confirmpay:${id}">✓ Sí, ya pagué</button>
    <button class="btn ghost mt" data-close="1">Cancelar</button>`);
}

async function init(){
  applyTheme();
  spawnFish();
  if(!SUPA_URL||!SUPA_KEY){showAuth('login');return;}
  try{
    const c=await sb();
    const{data:{session}}=await c.auth.getSession();
    if(!session){showAuth('login');return;}
    supaUser=session.user;
    c.auth.onAuthStateChange((_ev,s)=>{if(!s)showAuth('login');else supaUser=s.user;});
    await afterLogin();
  }catch(e){console.error('init:',e);showAuth('login');}
  fetchWeather();
}
init();

</script>
